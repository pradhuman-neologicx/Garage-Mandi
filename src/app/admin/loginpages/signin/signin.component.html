<div class="flex flex-col justify-center h-full w-full max-w-md mx-auto">
  <div class="bg-white rounded-3xl shadow-2xl overflow-hidden p-8 sm:p-10 transition-all duration-300 ring-1 ring-gray-100 h-full flex flex-col justify-center">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center p-3 bg-blue-50/50 rounded-2xl mb-4 border border-blue-100/50">
        <img src="./assets/logo.png" alt="Logo" class="h-12 w-auto object-contain drop-shadow-sm" />
      </div>
      <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-2">Welcome Back</h2>
      <p class="text-sm text-gray-500 font-medium">Please enter your credentials to access the admin panel.</p>
    </div>

    <form [formGroup]="signIn" class="space-y-6">
      
      <!-- Email Field -->
      <div>
        <label for="Email" class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
            <i class="fa-solid fa-envelope text-gray-400"></i>
          </div>
          <input 
            type="email" 
            id="Email" 
            formControlName="Email"
            class="block w-full pl-11 pr-3 py-3 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-custom-primary focus:border-transparent transition-all sm:text-sm bg-gray-50 focus:bg-white"
            placeholder="you@example.com"
            [ngClass]="{
              'border-red-300 text-red-900 placeholder-red-300 focus:ring-red-500 focus:border-red-500 bg-red-50': signIn.controls['Email'].errors && (signIn.controls['Email'].touched || signIn.controls['Email'].dirty)
            }"
          />
        </div>
        <div class="mt-2 text-sm text-red-600 flex items-center gap-1.5" *ngIf="signIn.controls['Email'].errors && (signIn.controls['Email'].touched || signIn.controls['Email'].dirty)">
          <i class="fa-solid fa-circle-exclamation text-xs"></i>
          <span *ngIf="signIn.controls['Email'].errors['required']" class="font-medium">Email is required.</span>
          <span *ngIf="signIn.controls['Email'].errors['pattern']" class="font-medium">Please enter a valid email address.</span>
        </div>
      </div>

      <!-- Password Field -->
      <div>
        <div class="flex items-center justify-between mb-2">
          <label for="Password" class="block text-sm font-semibold text-gray-700">Password</label>
          <a routerLink="/forgot_password" class="text-sm font-bold text-custom-primary hover:opacity-80 hover:underline transition-colors">Forgot password?</a>
        </div>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
            <i class="fa-solid fa-lock text-gray-400"></i>
          </div>
          <input 
            [type]="password" 
            id="Password" 
            formControlName="Password"
            class="block w-full pl-11 pr-11 py-3 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-custom-primary focus:border-transparent transition-all sm:text-sm bg-gray-50 focus:bg-white"
            placeholder="••••••••"
            [ngClass]="{
              'border-red-300 text-red-900 placeholder-red-300 focus:ring-red-500 focus:border-red-500 bg-red-50': signIn.controls['Password'].errors && (signIn.controls['Password'].touched || signIn.controls['Password'].dirty)
            }"
          />
          <button 
            type="button"
            class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-custom-primary focus:outline-none transition-colors"
            (click)="togglePasswordVisibility()">
            <i class="fa-solid" [ngClass]="show ? 'fa-eye-slash' : 'fa-eye'"></i>
          </button>
        </div>
        <div class="mt-2 text-sm text-red-600 flex items-center gap-1.5" *ngIf="signIn.controls['Password'].errors && (signIn.controls['Password'].touched || signIn.controls['Password'].dirty)">
          <i class="fa-solid fa-circle-exclamation text-xs"></i>
          <span *ngIf="signIn.controls['Password'].errors['required']" class="font-medium">Password is required.</span>
          <span *ngIf="signIn.controls['Password'].errors['minlength']" class="font-medium">Must be at least 6 characters.</span>
        </div>
      </div>

      <!-- Submit Button -->
      <div class="pt-4">
        <button 
          (click)="login()"
          class="w-full flex justify-center items-center py-3.5 px-4 border border-transparent rounded-xl shadow-lg shadow-custom-primary/30 text-sm font-bold text-white bg-custom-primary hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-custom-primary transition-all duration-300 transform hover:-translate-y-1"
        >
          <span>Sign In</span>
          <i class="fa-solid fa-arrow-right ml-2 text-xs opacity-80"></i>
        </button>
      </div>

      <!-- Server Error -->
      <div *ngIf="!submitted && errorMessage" class="rounded-xl bg-red-50 p-4 border border-red-100 mt-4">
        <div class="flex">
          <div class="flex-shrink-0">
            <i class="fa-solid fa-circle-xmark text-red-500 mt-0.5"></i>
          </div>
          <div class="ml-3">
            <p class="text-sm font-bold text-red-800">{{ errorMessage }}</p>
          </div>
        </div>
      </div>

    </form>
  </div>
</div>

<!-- Success Modal -->
<div *ngIf="openSecondsuccess" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/50 backdrop-blur-sm transition-opacity" [@slideIn]>
  <div class="bg-white rounded-2xl shadow-2xl p-6 flex items-center gap-5 border border-gray-100 max-w-sm w-full transform transition-all scale-100">
    <div class="flex-shrink-0 w-14 h-14 rounded-full bg-green-100 flex items-center justify-center shadow-inner">
      <i class="fa-solid fa-check text-2xl text-green-600"></i>
    </div>
    <div>
      <h3 class="text-xl font-bold text-gray-900 mb-0.5">Success!</h3>
      <p class="text-sm text-gray-500 font-medium">Login successful. Redirecting...</p>
    </div>
  </div>
</div>
