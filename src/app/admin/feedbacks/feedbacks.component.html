<div class="min-h-screen container mx-auto">
  <!-- Header -->
  <div class="mb-8 flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold text-gray-800 mb-1">Feedback & Ratings Moderation</h1>
      <p class="text-sm text-gray-500">Monitor customer reviews and hide abusive or fake comments.</p>
    </div>
  </div>

  <!-- Content Container -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
    
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-gray-50 border-b border-gray-100 text-xs uppercase tracking-wider text-gray-500 font-bold">
            <th class="p-4">Date</th>
            <th class="p-4">Customer</th>
            <th class="p-4">Provider / Garage</th>
            <th class="p-4">Rating</th>
            <th class="p-4 w-1/3">Comment</th>
            <th class="p-4 text-center">Status</th>
            <th class="p-4 text-center">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
          <tr *ngFor="let fb of feedbacks" [ngClass]="{'opacity-60 bg-gray-50': fb.status === 'Hidden'}" class="hover:bg-gray-50/50 transition-colors">
            <td class="p-4 text-sm text-gray-600">{{ fb.date }}</td>
            <td class="p-4 font-bold text-gray-800 text-sm">{{ fb.customerName }}</td>
            <td class="p-4 font-semibold text-custom-primary text-sm">{{ fb.providerName }}</td>
            <td class="p-4">
              <div class="flex items-center space-x-1 text-amber-400 text-sm">
                <i class="fa-solid fa-star" *ngFor="let star of [1,2,3,4,5]; let i = index" [ngClass]="i < fb.rating ? 'text-amber-400' : 'text-gray-300'"></i>
              </div>
            </td>
            <td class="p-4 text-sm text-gray-700 italic">"{{ fb.comment }}"</td>
            <td class="p-4 text-center">
              <span [ngClass]="fb.status === 'Visible' ? 'bg-green-100 text-green-700' : 'bg-gray-200 text-gray-600'" class="text-xs px-2.5 py-1 rounded-full font-semibold">
                {{ fb.status }}
              </span>
            </td>
            <td class="p-4 text-center space-x-2">
              <button *ngIf="fb.status === 'Visible'" (click)="toggleVisibility(fb)" class="text-red-600 hover:text-red-900 bg-red-50 hover:bg-red-100 p-2 rounded-lg transition-colors" title="Hide Feedback">
                <i class="fa-solid fa-eye-slash"></i>
              </button>
              <button *ngIf="fb.status === 'Hidden'" (click)="toggleVisibility(fb)" class="text-green-600 hover:text-green-900 bg-green-50 hover:bg-green-100 p-2 rounded-lg transition-colors" title="Show Feedback">
                <i class="fa-solid fa-eye"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
